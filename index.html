<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ChunkBlast</title>

    <!-- POLICE SPÉCIALE ORBITRON -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <!-- CSS COMPLET -->
    <style>
        /* ========== GLOBAL ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Orbitron', sans-serif;
        }
        body {
            overflow: hidden;
        }

        /* ========== PAGES ========== */
        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            background-size: cover;
            background-position: center;
            color: white;
        }
        .active {
            display: block;
        }

        /* ========== PAGE 1 ========== */
        #page1 {
            background: url("assets/bg1.jpg") center/cover no-repeat;
        }
        #page1 .top-title {
            position: absolute;
            top: 30px;
            left: 40px;
            font-size: 35px;
        }
        #page1 .main-title {
            position: absolute;
            top: 150px;
            left: 40px;
            font-size: 60px;
            line-height: 1.2;
        }
        #page1 .btn {
            position: absolute;
            bottom: 100px;
            left: 40px;
            padding: 15px 35px;
            border-radius: 40px;
            border: none;
            background: linear-gradient(90deg, #6c5cff, #a855f7);
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        /* ========== PAGE 2 ========== */
        #page2 {
            background: url("assets/bg2.jpg") center/cover no-repeat;
            text-align: center;
        }
        #page2 .center {
            position: absolute;
            top: 30%;
            width: 100%;
            transform: translateY(-30%);
        }
        #page2 .main-title {
            font-size: 50px;
        }
        #page2 .hearts {
            margin: 20px 0;
            font-size: 30px;
        }
        #page2 .start {
            margin-top: 30px;
            background: linear-gradient(90deg, #ffe66d, #b5ff7d);
            color: black;
            padding: 15px 40px;
            border-radius: 40px;
            border: none;
            font-size: 18px;
            cursor: pointer;
        }

        /* ========== PAGE 3 ========== */
        #page3 {
            background: url("assets/bg3.jpg") center/cover no-repeat;
        }
        #page3 .right {
            position: absolute;
            right: 40px;
            top: 150px;
            text-align: right;
            font-size: 50px;
        }
        #page3 p {
            font-size: 22px;
            margin-top: 20px;
        }

        /* ========== FLECHES RETOUR ========== */
        .back {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 24px;
            color: black;
            cursor: pointer;
            opacity: 0.7;
        }
    </style>
</head>

<body>

<!-- ========== PAGE 1 ========== -->
<div id="page1" class="page active">
    <div class="top-title">CHUNKBLASt GAME</div>
    <div class="main-title">
        Découvrez un<br>univers unique<br>avec<br>ChunkBlast
    </div>
    <button class="btn" onclick="goToPage(2)">DÉCOUVRIR L’UNIVERS →</button>
</div>

<!-- ========== PAGE 2 ========== -->
<div id="page2" class="page">
    <div class="center">
        <h1 class="main-title">Chunkblast C’est quoi ?</h1>
        <div class="hearts">❤️ ❤️ ❤️ ❤️ ❤️</div>
        <p>chunkblast est un jeu simple et intellectuel</p>
        <button class="start" onclick="goToPage(3)">START</button>
    </div>
    <div class="back" onclick="goToPage(1)">⬅</div>
</div>

<!-- ========== PAGE 3 ========== -->
<div id="page3" class="page">
    <div class="right">
        <h1>DISPONIBILITÉ</h1>
        <p>disponible sur PS5, Switch, xbox et PC !</p>
    </div>
    <div class="back" onclick="goToPage(2)">⬅</div>
</div>

<!-- ========== JS ========== -->
<script>
function goToPage(pageNumber) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page' + pageNumber).classList.add('active');
}
</script>

</body>
</html>
