<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ChunkBlast</title>

    <!-- CSS -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }

        body {
            overflow: hidden;
        }

        .page {
            width: 100vw;
            height: 100vh;
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            background-size: cover;
            background-position: center;
            color: white;
            padding: 60px;
        }

        .active {
            display: block;
        }

        #page1 { background: black; }
        #page2 { background: #111; text-align: center; }
        #page3 { background: #222; }

        .title-top { font-size: 40px; margin-bottom: 40px; }
        .main-title { font-size: 60px; }

        .btn {
            margin-top: 40px;
            padding: 15px 40px;
            border-radius: 40px;
            border: none;
            background: purple;
            color: white;
            cursor: pointer;
        }

        .start {
            background: yellow;
            color: black;
        }

        .back {
            position: absolute;
            bottom: 20px;
            left: 20px;
            cursor: pointer;
            color: white;
        }
    </style>
</head>

<body>

<!-- PAGE 1 -->
<section id="page1" class="page active">
    <h1 class="title-top">CHUNKBLASt GAME</h1>
    <h2 class="main-title">
        Découvrez un univers unique avec ChunkBlast
    </h2>
    <button onclick="goToPage(2)" class="btn">
        DÉCOUVRIR L’UNIVERS →
    </button>
</section>

<!-- PAGE 2 -->
<section id="page2" class="page">
    <h2 class="main-title">Chunkblast C’est quoi ?</h2>
    <p>❤️ ❤️ ❤️ ❤️ ❤️</p>
    <p>chunkblast est un jeu simple et intellectuel</p>

    <button onclick="goToPage(3)" class="btn start">START</button>
    <div class="back" onclick="goToPage(1)">⬅</div>
</section>

<!-- PAGE 3 -->
<section id="page3" class="page">
    <h2 class="main-title">DISPONIBILITÉ</h2>
    <p>disponible sur PS5, Switch, xbox et PC !</p>

    <div class="back" onclick="goToPage(2)">⬅</div>
</section>

<!-- JS -->
<script>
function goToPage(pageNumber) {
    const pages = document.querySelectorAll(".page");
    pages.forEach(page => page.classList.remove("active"));
    document.getElementById("page" + pageNumber).classList.add("active");
}
</script>

</body>
</html>
